<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
</head>
<body>
    <header>
        <div id="burger"><i class="bi bi-list"></i></div>
        <div class="logo">
            <img style="-webkit-user-drag: none;user-select: none;" src="img/rjbolao.png" height="70px" alt="FLAMENGO RJ">
        </div>
    </header>
    <menu id="menuNav">
        <li onclick="openViewer('members')"><i class="bi bi-person-fill"></i> Membros</li>
        <li onclick="openViewer('historic')"><i class="bi bi-clock-history"></i> Bolões anteriores</li>
        <li onclick="openViewer('winners')"><i class="bi bi-trophy-fill"></i> Ganhadores</li>
        <li onclick="openViewer('rank')"><i class="bi bi-award"></i> Ranking Geral</li>
        <li onclick="openViewer('laws')"><i class="bi bi-check2-circle"></i> *REGRAS DO BOLÃO*</li>
        <li onclick="openViewer('gifts')"><i class="bi bi-gift"></i> Premiação</li>
        <li onclick="openViewer('troble')"><i class="bi bi-question-diamond-fill"></i> Problema no bolão</li>
    </menu>
    <section id="viewer">
        <p style="font-size: 40px; margin-top: 14%;">SEJA BEM-VINDO! ^_^ <br>SAIBA TUDO DO BOLÃO DO NOSSO GRUPO <br>FLAMENGO RJ</p>
    </section>
    <div id="darkScreen" onclick="closeMenu()"></div>
    <script src="script.js"></script>
</body>
</html>
